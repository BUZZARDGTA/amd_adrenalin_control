name: Build Windows EXE On Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "x64"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Windows version metadata
        run: python .github/workflows/scripts/generate_version_info.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --version-file .github/workflows/version_info.txt --name amd-adrenalin-control main.py

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/amd-adrenalin-control.exe
          fail_on_unmatched_files: true
